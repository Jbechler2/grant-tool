services:
  db:
    image: postgres:16
    container_name: grant-tool-db
    environment:
      POSTGRES_USER: granttool
      POSTGRES_PASSWORD: localdevpassword
      POSTGRES_DB: granttool
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
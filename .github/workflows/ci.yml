name: Continuous Integration
on:
  pull_request:
    branches: [ main ]
jobs:
    build:
      defaults:
        run:
          working-directory: ./app
      runs-on: ubuntu-latest
      steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
            go-version: '1.25.6'

      - name: Build
        run: go build -v ./...

      - name: Vet
        run: go vet -v ./...

      - name: Test
        run: go test -v ./...

name: Continuous Integration
on:
  pull_request:
    branches: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/**'
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/**'

jobs:
    build-and-test:
      defaults:
        run:
          working-directory: ./backend
      runs-on: ubuntu-latest
      steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
            go-version: '1.25.6'

      - name: Build
        run: go build -v ./...

      - name: Vet
        run: go vet -v ./...

      - name: Test
        run: go test -v ./...

    deploy:
      needs: build-and-test
      runs-on: ubuntu-latest
      if: >-
        github.event_name == 'push' && 
        github.ref == 'refs/heads/main'

      permissions:
        id-token: write
        contents: read

      steps:
        - name: Configure AWS Credentials
          uses: aws-actions/configure-aws-credentials@v4
          with:
            role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
            aws-region: ${{ secrets.AWS_REGION }}

        - name: Deploy via SSM
          run: |
            COMMAND_ID=$(aws ssm send-command \
            --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "cd /opt/grant-tool/grant-tool",
              "git pull origin main",
              "go build -o grant-tool-bin ./cmd/api/main.go",
              "sudo systemctl restart grant-tool"
            ]' \
            --output text \
            --query "Command.CommandId")

            aws ssm wait command-executed \
              --command-id $COMMAND_ID \
              --instance-id ${{ secrets.EC2_INSTANCE_ID }}

    verify: 
      needs: deploy
      runs-on: ubuntu-latest
      if: >-
        github.event_name == 'push' && 
        github.ref == 'refs/heads/main'

      steps:
        - name: Verify backend
          run: |
            curl --fail https://www.upwellgrantmanager.com/health || exit 1
        
        - name: Verify frontend
          run: curl --fail https://www.upwellgrantmanager.com || exit 1
